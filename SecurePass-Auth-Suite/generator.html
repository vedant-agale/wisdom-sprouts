<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔐 Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 d-block"> <div class="container col-md-6 auth-card mt-5 mx-auto">
        <h2 class="mb-4">🔐 Password Generator</h2>
        
        <div class="mb-3">
            <label for="length" class="form-label">Password Length:</label>
            <input type="number" id="length" class="form-control" min="4" max="20" value="12">
        </div>

        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="includeNumbers" checked>
            <label class="form-check-label">Include Numbers</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="includeUppercase" checked>
            <label class="form-check-label">Include Uppercase</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="includeSpecial" checked>
            <label class="form-check-label">Include Special Characters</label>
        </div>
        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="excludeAmbiguous">
            <label class="form-check-label">Exclude ambiguous characters (l, 1, I, O, 0)</label>
        </div>

        <button class="btn btn-primary w-100 mb-4" onclick="generateAdvancedPassword()">Generate Password</button>

        <div class="mb-3">
            <label class="form-label">Generated Password:</label>
            <div class="input-group">
                <input type="password" class="form-control" id="result" readonly>
                <button class="btn btn-outline-secondary" onclick="copyPassword()">Copy</button>
            </div>
            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="togglePassword" onclick="togglePasswordVisibility()">
                <label class="form-check-label small">Show Password</label>
            </div>
        </div>

        <div class="progress"><div id="strengthBar" class="progress-bar"></div></div>
        <p id="strengthText" class="mt-2 fw-bold text-center"></p>

        <div class="text-center mt-4">
            <a href="index.html" class="text-danger small text-decoration-none">Logout</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
