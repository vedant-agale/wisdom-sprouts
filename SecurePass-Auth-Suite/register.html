<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | SecurePass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <h2>📝 Sign Up</h2>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="regUser" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="regEmail" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="regPass" class="form-control">
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="regRepeat" class="form-control">
        </div>
        <button class="btn btn-primary w-100 mb-3" onclick="handleRegistration()">Register</button>
        <p class="text-center small">Have an account? <a href="index.html">Login</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
