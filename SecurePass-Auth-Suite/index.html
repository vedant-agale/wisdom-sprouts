<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SecurePass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <h2>🔑 Login</h2>
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com">
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" id="loginPass" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn btn-primary w-100 mb-3" onclick="handleLogin()">Login to Vault</button>
        <p class="text-center small">New user? <a href="register.html">Sign Up</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
