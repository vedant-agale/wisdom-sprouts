<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Air Max 90 Dynamic | Vedant Agale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-wrapper">
        <div class="product-card" id="mainCard">
            
            <div class="image-box">
                <img src="sneaker_black.png" id="mainImage" alt="Nike Air Max 90">
            </div>

            <div class="details-box">
                <span class="brand">Nike</span>
                <h1 id="modelName">Air Max 90 - Triple Black</h1>
                <p>An iconic staple. Features iconic Max Air cushioning with classic TPU accents.</p>
                
                <h6 class="colors-title">Select Colorway:</h6>
                <div class="color-options">
    <div class="color-circle active black" onclick="changeTheme('black')" style="background-color: #111;"></div>
    <div class="color-circle volt" onclick="changeTheme('volt')" style="background-color: #DFFF00;"></div>
    <div class="color-circle infrared" onclick="changeTheme('infrared')" style="background-color: #ff4d4d;"></div>
</div>

                <div class="price-row mt-auto">
                    <div class="price">₹12,999</div>
                    <button class="btn btn-dark" id="buyBtn">Add to Bag</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
