<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Project Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <div class="dashboard-header mb-4 text-center">
        <h1 class="fw-bold text-dark">Project Management <span class="text-primary">Dashboard</span></h1>
        <p class="text-secondary">Fetching dynamic data from MockAPI</p>
    </div>

    <div class="row g-3 mb-4 align-items-center">
        <div class="col-md-6">
            <div class="search-group">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Search by Project Name...">
            </div>
        </div>
        <div class="col-md-4">
            <select id="statusFilter" class="form-select">
                <option value="All">All Status</option>
                <option value="Completed">Completed</option>
                <option value="Pending">Pending</option>
            </select>
        </div>
        <div class="col-md-2 text-end">
            <button id="sortBtn" class="btn btn-outline-primary w-100">
                <i class="fas fa-sort"></i> Sort Name
            </button>
        </div>
    </div>

    <div class="table-container shadow-sm bg-white rounded">
        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-secondary">Fetching Projects...</p>
        </div>
        
        <table class="table table-hover mb-0 d-none" id="projectTable">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Project Name</th>
                    <th>Description</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        
        <div id="noDataMessage" class="text-center py-5 d-none">
            <i class="fas fa-folder-open fa-3x text-light mb-3"></i>
            <p class="text-secondary">No matching projects found!</p>
        </div>
    </div>

    <nav class="mt-4">
        <ul class="pagination justify-content-center" id="pagination">
            </ul>
    </nav>
</div>

<script src="script.js"></script>
</body>
</html>
