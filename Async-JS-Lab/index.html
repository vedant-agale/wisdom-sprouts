<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Mastery Lab | Vedant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Async <span class="text-warning">Mastery Lab</span></h1>
        <p class="text-secondary">Handling Callbacks, Intervals, and Promises</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-8 mx-auto">
            <div class="lab-card">
                <h3 class="mb-4"><i class="fas fa-images text-primary"></i> 1. Auto-Slide Gallery</h3>
                <div class="slider-container">
                    <img id="sliderImg" src="https://picsum.photos/id/10/800/400" alt="Slider" class="img-fluid rounded shadow">
                    <button id="prevBtn" class="slider-btn prev"><i class="fas fa-chevron-left"></i></button>
                    <button id="nextBtn" class="slider-btn next"><i class="fas fa-chevron-right"></i></button>
                </div>
                <p class="mt-3 text-center text-muted small">Updates every 3 seconds using <code>setInterval</code></p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="lab-card h-100 text-center">
                <h3 class="mb-4"><i class="fas fa-clock text-success"></i> 2. Live Digital Clock</h3>
                <div id="clock" class="display-time">00:00:00 AM</div>
                <p class="mt-3 text-muted">Real-time UI updates every second</p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="lab-card h-100 text-center">
                <h3 class="mb-4"><i class="fas fa-hourglass-half text-danger"></i> 3. Smart Countdown</h3>
                <div class="input-group mb-3 justify-content-center">
                    <input type="number" id="timerInput" class="form-control w-50" placeholder="Seconds...">
                    <button class="btn btn-danger" onclick="startCountdown()">Start Timer</button>
                </div>
                <div id="countdownDisplay" class="display-time text-danger">--s</div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <a href="../index.html" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i> Back to Submission Portal
        </a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
