<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Mastery Hub | Vedant Agale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme"> <nav class="navbar navbar-expand-lg shadow-sm sticky-top bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">JS Mastery Hub</a>
            <button class="btn btn-outline-dark btn-sm" id="themeToggle">
                <i class="fas fa-moon"></i> Change Theme
            </button>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="task-card">
                    <h5><i class="fas fa-list-check me-2"></i> To-Do List</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="todoInput" class="form-control" placeholder="New task...">
                        <button class="btn btn-primary" onclick="addTodo()">Add</button>
                    </div>
                    <ul id="todoList" class="list-group list-group-flush"></ul>
                </div>
            </div>

            <div class="col-md-4">
                <div class="task-card">
                    <h5><i class="fas fa-user-shield me-2"></i> Form & Security</h5>
                    <input type="text" id="valName" class="form-control mb-2" placeholder="Full Name">
                    <input type="email" id="valEmail" class="form-control mb-2" placeholder="Email">
                    <input type="password" id="valPass" class="form-control mb-1" placeholder="Password" oninput="checkStrength(this.value)">
                    <div class="progress mb-3" style="height: 5px;">
                        <div id="strengthBar" class="progress-bar"></div>
                    </div>
                    <button class="btn btn-success w-100" onclick="validateForm()">Validate Form</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="task-card text-center">
                    <h5><i class="fas fa-calculator me-2"></i> Persistent Counter</h5>
                    <h1 id="counterVal" class="display-4 fw-bold">0</h1>
                    <div class="btn-group w-100 mt-3">
                        <button class="btn btn-danger" onclick="updateCounter(-1)">-1</button>
                        <button class="btn btn-secondary" onclick="updateCounter('reset')">Reset</button>
                        <button class="btn btn-primary" onclick="updateCounter(1)">+1</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="task-card text-center">
                    <h5><i class="fas fa-window-maximize me-2"></i> Modal Component</h5>
                    <p class="small text-muted">Clean interaction practice.</p>
                    <button class="btn btn-dark w-100" onclick="toggleModal(true)">Open Pro Modal</button>
                </div>
            </div>

        </div>
    </div>

    <div id="customModal" class="modal-overlay">
        <div class="modal-content-custom">
            <h4>Awesome Modal!</h4>
            <p>This modal is built with completely smooth, custom logic. It is not a Bootstrap modal!</p>
            <button class="btn btn-danger" onclick="toggleModal(false)">Close Box</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
