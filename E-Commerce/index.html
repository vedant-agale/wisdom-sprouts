<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ApnaBazaar | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">ApnaBazaar</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item">
                        <button class="nav-link" type="button" data-bs-toggle="modal" data-bs-target="#addProduct">
                            <i class="fas fa-plus-circle me-1"></i>Add Product
                        </button>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="./cart.html" class="nav-link position-relative">
                        <i class="fas fa-shopping-basket fs-4"></i>
                        <span class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle" id="cartLength">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row align-items-center bg-light p-3 rounded shadow-sm">
            <div class="col-md-4">
                <input type="search" id="searchInput" class="form-control" placeholder="Search products..." oninput="filterAndSort()">
            </div>
            <div class="col-md-8 d-flex gap-2 justify-content-md-end mt-2 mt-md-0">
                <select id="filterSelect" class="form-select w-auto" onchange="filterAndSort()">
                    <option value="all">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Kitchen Accessories">Kitchen Accessories</option>
                </select>
                <select id="sortSelect" class="form-select w-auto" onchange="filterAndSort()">
                    <option value="none">Sort By</option>
                    <option value="lowToHigh">Price: Low to High</option>
                    <option value="highToLow">Price: High to Low</option>
                </select>
            </div>
        </div>
    </div>

    <h1 class="text-center my-4 fw-bold">Our Products</h1>

    <div class="container">
        <div class="row g-4" id="renderProducts"></div>
    </div>

    <div class="modal fade" id="addProduct" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Add New Product</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="form-floating mb-3"><input type="text" id="title" class="form-control" placeholder="T"><label>Title</label></div>
                    <div class="form-floating mb-3"><input type="text" id="description" class="form-control" placeholder="D"><label>Description</label></div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select id="category" class="form-select">
                            <option value="Electronics">Electronics</option>
                            <option value="Kitchen Accessories">Kitchen Accessories</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Brand</label>
                        <select id="brand" class="form-select">
                            <option value="Samsung">Samsung</option>
                            <option value="Hawkins">Hawkins</option>
                        </select>
                    </div>
                    <div class="form-floating mb-3"><input type="number" id="price" class="form-control"><label>Price</label></div>
                    <div class="form-floating mb-3"><input type="number" id="quantity" class="form-control" value="10"><label>Quantity</label></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="AddNewProduct()">Add Product</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
