<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="weather-card">
                        <div class="search-section">
                            <h2 class="app-title">Weather</h2>
                            <div class="input-group mb-4">
                                <input type="text" id="cityInput" class="form-control custom-input" placeholder="Search City...">
                                <button class="btn btn-search" id="getWeatherBTN">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>

                        <div id="showWeather" class="display-section">
                            <div class="welcome-text">
                                <i class="fas fa-cloud-sun fa-3x mb-3"></i>
                                <p>Ready to check the skies?</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
